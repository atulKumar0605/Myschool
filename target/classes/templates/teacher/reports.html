<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Reports - MySchool</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/teacher/dashboard}"><span>MS</span> MySchool</a>
    <nav>
        <a th:href="@{/teacher/dashboard}">Dashboard</a>
        <a th:href="@{/teacher/students}">Students</a>
        <a th:href="@{/teacher/attendance}">Attendance</a>
        <a class="active" th:href="@{/teacher/reports}">Reports</a>
    </nav>
    <form th:action="@{/logout}" method="post">
        <button class="ghost-button" type="submit">Logout</button>
    </form>
</header>

<main class="app-shell">
    <section class="page-title">
        <div>
            <p class="eyebrow">Test Reports</p>
            <h1 th:text="${classInfo.label()}">Class 8 - A</h1>
            <p class="muted">Subject-wise marks, percentage, and teacher remarks.</p>
        </div>
    </section>

    <div th:if="${success}" class="alert alert-success" th:text="${success}">Saved.</div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}">Error.</div>

    <section class="panel">
        <div class="section-heading">
            <h2>Add Test Report</h2>
            <span th:text="${reports.size()} + ' reports'">0 reports</span>
        </div>
        <form th:action="@{/teacher/reports}" method="post" class="form-grid report-composer">
            <label>Student
                <select name="studentId" required>
                    <option th:each="student : ${students}" th:value="${student.id}" th:text="${student.rollNumber + ' - ' + student.fullName}">Student</option>
                </select>
            </label>
            <label>Subject
                <select name="subjectId" required>
                    <option th:each="subject : ${subjects}" th:value="${subject.id}" th:text="${subject.name + ' (' + subject.code + ')'}">Subject</option>
                </select>
            </label>
            <label>Test Name<input name="testName" required placeholder="Unit Test 2"></label>
            <label>Test Date<input name="testDate" type="date" required></label>
            <label>Marks<input name="marksObtained" type="number" min="0" required></label>
            <label>Max Marks<input name="maxMarks" type="number" min="1" required></label>
            <label class="span-2">Remarks<input name="teacherRemarks" required placeholder="Short remark"></label>
            <button class="primary-button" type="submit">Add Report</button>
        </form>
    </section>

    <section class="panel">
        <div class="section-heading">
            <h2>Report Gallery</h2>
            <span>Newest first</span>
        </div>
        <div class="report-gallery">
            <article th:each="report : ${reports}" class="report-card">
                <div class="report-card-top">
                    <span class="report-medal" th:text="${report.percentage()} + '%'">86%</span>
                    <div>
                        <strong th:text="${report.studentName}">Student</strong>
                        <small th:text="'Roll ' + ${report.rollNumber} + ' | ' + ${report.subjectName}">Roll 1 | Subject</small>
                    </div>
                </div>
                <h3 th:text="${report.testName}">Unit Test</h3>
                <div class="score-meter">
                    <span th:style="'width:' + ${report.percentage()} + '%'"></span>
                </div>
                <div class="report-meta">
                    <span th:text="${report.testDate}">2026-06-01</span>
                    <b th:text="${report.marksObtained + '/' + report.maxMarks}">43/50</b>
                </div>
                <p th:text="${report.teacherRemarks}">Remark</p>
            </article>
        </div>
    </section>
</main>
</body>
</html>
